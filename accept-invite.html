<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activate Your Account – Ayurvana</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    /* ── PASTE YOUR FULL CSS VARIABLES BLOCK HERE (copy from alumni-portal.html) ── */
    :root, [data-theme="light"] {
      --bg: #f5ede8; --surface: #faf7f4; --surface2: #fdf9f7;
      --text: #3a3530; --muted: #7a7068; --faint: #b8a89e;
      --primary: #5a8f3c; --primary-h: #3d6828; --primary-hl: #d8eacf;
      --gold: #c49a3c;
      --r-md: .5rem; --r-lg: .75rem; --r-xl: 1.25rem; --r-full: 9999px;
      --s2: .5rem; --s3: .75rem; --s4: 1rem; --s5: 1.25rem; --s6: 1.5rem;
      --s8: 2rem; --s10: 2.5rem; --s12: 3rem; --s20: 5rem;
      --xs: clamp(.75rem, .7rem + .25vw, .875rem);
      --sm: clamp(.875rem, .8rem + .35vw, 1rem);
      --base: clamp(1rem, .95rem + .25vw, 1.125rem);
      --lg: clamp(1.125rem, 1rem + .75vw, 1.5rem);
      --xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --display: Lora, Georgia, serif;
      --body: Lora, Georgia, serif;
      --sh-md: 0 4px 16px oklch(.2 .02 80 / .09);
      --tr: 200ms cubic-bezier(.16, 1, .3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      font-family: var(--body);
      font-size: var(--base);
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--s8);
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border-radius: var(--r-xl);
      border: 1px solid oklch(from var(--text) l c h / .08);
      box-shadow: var(--sh-md);
      padding: var(--s10) var(--s10);
      width: 100%;
      max-width: 440px;
    }

    /* ── LOGO ── */
    .logo {
      display: flex;
      align-items: center;
      gap: var(--s3);
      font-family: var(--display);
      font-size: var(--lg);
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      margin-bottom: var(--s8);
    }
    .logo img { width: 40px; height: 40px; object-fit: contain; }

    /* ── HEADING ── */
    .card h1 {
      font-family: var(--display);
      font-size: var(--xl);
      font-weight: 500;
      line-height: 1.2;
      margin-bottom: var(--s2);
    }
    .card p.sub {
      font-size: var(--sm);
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: var(--s8);
    }

    /* ── FORM FIELDS (matches your .fg style) ── */
    .fg {
      display: flex;
      flex-direction: column;
      gap: var(--s2);
      margin-bottom: var(--s4);
    }
    .fg label {
      font-size: var(--sm);
      font-weight: 600;
      color: var(--text);
    }
    .fg input {
      padding: var(--s3) var(--s4);
      background: var(--bg);
      border: 1px solid oklch(from var(--text) l c h / .15);
      border-radius: var(--r-md);
      font-size: var(--sm);
      color: var(--text);
      font-family: var(--body);
      outline: none;
      transition: border-color var(--tr), box-shadow var(--tr);
    }
    .fg input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px oklch(from var(--primary) l c h / .15);
    }

    /* ── SUBMIT (matches your .fsub style) ── */
    .fsub {
      width: 100%;
      padding: var(--s4);
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--r-full);
      font-size: var(--base);
      font-weight: 700;
      font-family: var(--body);
      cursor: pointer;
      transition: background var(--tr), transform var(--tr);
      margin-top: var(--s2);
    }
    .fsub:hover { background: var(--primary-h); transform: translateY(-1px); }
    .fsub:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* ── ERROR MESSAGE ── */
    .err {
      font-size: var(--xs);
      color: #c0392b;
      margin-top: var(--s4);
      text-align: center;
      display: none;
    }
    .err.show { display: block; }

    .fnote {
      text-align: center;
      font-size: var(--xs);
      color: var(--faint);
      margin-top: var(--s4);
    }
  </style>
</head>
<body>

  <div class="card">
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="Ayurvana" />
      Ayurvana
    </a>

    <h1>Welcome to the Alumni Portal.</h1>
    <p class="sub">Set your name and create a password to activate your account.</p>

    <form id="accept-form" novalidate>
      <div class="fg">
        <label for="full-name">Your Full Name</label>
        <input type="text" id="full-name" name="full-name" placeholder="Sarah Chen" required autocomplete="name" />
      </div>
      <div class="fg">
        <label for="password">Create Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required autocomplete="new-password" />
      </div>
      <div class="fg">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat your password" required autocomplete="new-password" />
      </div>

      <button type="submit" class="fsub" id="submit-btn">Activate My Account</button>
      <p class="err" id="err-msg">Something went wrong. Please try again.</p>
      <p class="fnote">Your details are kept private.</p>
    </form>
  </div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    const params = new URLSearchParams(window.location.hash.replace('#', '?'));
    const token = params.get('invite_token');

    // If no token, redirect to login
    if (!token) window.location.href = 'alumni.html';

    document.getElementById('accept-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('full-name').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      const errMsg = document.getElementById('err-msg');
      const btn = document.getElementById('submit-btn');

      errMsg.classList.remove('show');

      if (password !== confirm) {
        errMsg.textContent = 'Passwords do not match.';
        errMsg.classList.add('show');
        return;
      }
      if (password.length < 8) {
        errMsg.textContent = 'Password must be at least 8 characters.';
        errMsg.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Activating…';

      try {
  // Step 1: Accept the invite token with password
  const res = await fetch('/.netlify/identity/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'invite_token',
      invite_token: token,
      password: password,
      data: JSON.stringify({ full_name: name })
    })
  });

  if (res.ok) {
    window.location.href = 'alumni-portal.html';
  } else {
    const errData = await res.json();
    console.error('Netlify error:', errData);
    throw new Error(errData.error_description || 'Failed');
  }
} catch (err) {
  errMsg.textContent = err.message || 'Something went wrong. Please try again or contact us.';
  errMsg.classList.add('show');
  btn.disabled = false;
  btn.textContent = 'Activate My Account';
}

        if (res.ok) {
          window.location.href = 'alumni-portal.html';
        } else {
          throw new Error('Failed');
        }
      } catch {
        errMsg.textContent = 'Something went wrong. Please try again or contact us.';
        errMsg.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Activate My Account';
      }
    });
  </script>
</body>
</html>
