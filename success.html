<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiry Sent — Ayurvana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #5a8f3c;
      --text: #3a3530;
      --muted: #7a7068;
      --bg: #f5ede8;
      --display: Lora, Georgia, serif;
    }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: var(--display);
      color: var(--text);
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #d8eacf;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }
    .icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 500;
      margin-bottom: 1rem;
      line-height: 1.2;
    }
    p {
      font-size: 1rem;
      color: var(--muted);
      max-width: 44ch;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    a {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: var(--primary);
      color: #fff;
      border-radius: 9999px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 200ms ease;
    }
    a:hover { background: #3d6828; }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1>Your enquiry is on its way.</h1>
  <p>Thank you for reaching out. Our team will be in touch within 48 hours with programme details, availability, and pricing.</p>
  <a href="index.html">Return to Ayurvana</a>
</body>
</html>
